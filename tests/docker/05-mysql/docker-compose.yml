services:
  mysql:
    image: mysql:8.0
    container_name: mysql-brute-lab
    restart: "no"

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: brutedb

    command:
      [
        "--default-authentication-plugin=mysql_native_password",
        "--bind-address=0.0.0.0",
      ]

    volumes:
      - ./data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ptoor"]
      interval: 10s
      timeout: 5s
      retries: 5
