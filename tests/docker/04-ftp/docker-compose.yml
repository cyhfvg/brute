services:
  ftp-lab:
    container_name: ftp-lab
    hostname: ftp-lab
    build:
      context: .
      dockerfile_inline: |
        FROM debian:12-slim

        ENV DEBIAN_FRONTEND=noninteractive

        RUN apt-get update \
            && apt-get install -y --no-install-recommends vsftpd ca-certificates \
            && rm -rf /var/lib/apt/lists/*

        RUN set -eux; \
            mkdir -p /var/run/vsftpd/empty; \
            for i in $$(seq -w 1 10); do \
                user="ftpuser$${i}"; \
                pass="FtpPass$${i}!"; \
                useradd -m -s /bin/bash "$${user}"; \
                echo "$${user}:$${pass}" | chpasswd; \
                mkdir -p "/home/$${user}/ftp/upload"; \
                echo "welcome $${user}" > "/home/$${user}/ftp/readme.txt"; \
                chown -R "$${user}:$${user}" "/home/$${user}/ftp"; \
            done

        RUN set -eux; \
            { \
              echo "listen=YES"; \
              echo "listen_ipv6=NO"; \
              echo "anonymous_enable=NO"; \
              echo "local_enable=YES"; \
              echo "write_enable=YES"; \
              echo "local_umask=022"; \
              echo "chroot_local_user=YES"; \
              echo "allow_writeable_chroot=YES"; \
              echo "pam_service_name=vsftpd"; \
              echo "seccomp_sandbox=NO"; \
              echo "xferlog_enable=YES"; \
              echo "log_ftp_protocol=YES"; \
              echo "vsftpd_log_file=/var/log/vsftpd.log"; \
              echo "user_sub_token=\$$USER"; \
              echo "local_root=/home/\$$USER/ftp"; \
              echo "pasv_enable=NO"; \
              echo "port_enable=YES"; \
              echo "connect_from_port_20=YES"; \
            } > /etc/vsftpd.conf

        EXPOSE 20 21

        CMD ["/usr/sbin/vsftpd", "/etc/vsftpd.conf"]

    ports:
      - "21:21"
      - "20:20"

    restart: "no"
